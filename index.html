* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  color: #333;
}
.container {
  max-width: 500px;
  width: 100%;
}

/* ===== iPad / Tablet Layout ===== */
@media (min-width: 768px) {

  h1 { grid-column: 1 / -1; font-size: 30px; }
  .stats { grid-column: 1 / -1; }
  .nav { grid-column: 2; grid-row: 3; flex-direction: column; gap: 10px; margin-bottom: 0; }
  .nav-btn { flex: none; padding: 16px; font-size: 14px; text-align: left; }
  #view-study, #view-list, #view-import, #view-wrong, #view-stats { grid-column: 1; grid-row: 3; }
  .card { min-height: 380px; }
  .card .hanzi { font-size: 160px; }
  .card .pinyin { font-size: 30px; }
  .card .word { font-size: 24px; }
  .card .sentence { font-size: 18px; }
  .btn { padding: 24px; font-size: 22px; }
  .word-list { max-height: 600px; }
  .import-area textarea { height: 250px; }

h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 24px; }
.stats {
  display: flex;
  justify-content: space-around;

  padding: 12px;
  margin-bottom: 20px;
  color: white;
  font-size: 14px;
}
.stat-item { text-align: center; }
.stat-num { font-size: 24px; font-weight: bold; }
.stat-label { font-size: 11px; opacity: 0.8; }

.card-wrapper {
  perspective: 1000px;
  margin-bottom: 20px;
}
.card {
  background: white;
  border-radius: 20px;
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  min-height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.3s;
}
.card:active { transform: scale(0.98); }
.card .hanzi {
  font-size: 120px;
  font-weight: bold;
  color: #2d3436;
  line-height: 1.2;
  margin-bottom: 10px;
}
.card .pinyin {
  font-size: 24px;
  color: #636e72;
  margin-bottom: 5px;
  display: none;
}
.card .word {
  font-size: 20px;
  color: #b2bec3;
  display: none;
}
.card .sentence {
  font-size: 16px;
  color: #636e72;
  margin-top: 8px;
  display: none;
}
.card.show-hint .pinyin,
.card.show-hint .word,
.card.show-hint .sentence { display: block; }
.hint-btn {
  background: none;
  border: 1px dashed #ddd;
  color: #aaa;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 15px;
}
.hint-btn:hover { border-color: #999; color: #666; }

/* Progress */
.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  margin-bottom: 15px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #00b894;
  border-radius: 3px;
  transition: width 0.3s;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}
.btn {
  flex: 1;
  padding: 18px;
  border: none;
  border-radius: 16px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.95); }
.btn-know {
  background: #00b894;
  color: white;
}
.btn-know:hover { background: #00a884; }
.btn-dont-know {
  background: #e17055;
  color: white;
}
.btn-dont-know:hover { background: #d14532; }

/* Navigation */
.nav {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
}
.nav-btn {
  flex: 1;
  padding: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
  font-family: inherit;
}
.nav-btn:hover { background: rgba(255,255,255,0.2); }
.nav-btn.active { background: rgba(255,255,255,0.3); border-color: white; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Lists */
.word-list {
  background: white;
  border-radius: 12px;
  padding: 15px;
  max-height: 400px;
  overflow-y: auto;
}
.word-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 16px;
}
.word-item:last-child { border-bottom: none; }
.word-item .char { font-size: 24px; font-weight: bold; }
.word-item .info { font-size: 13px; color: #999; }
.badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  color: white;
}
.badge-new { background: #74b9ff; }
.badge-learning { background: #fdcb6e; color: #333; }
.badge-reviewing { background: #a29bfe; }
.badge-mastered { background: #00b894; }

.import-area {
  background: white;
  border-radius: 12px;
  padding: 15px;
}
.import-area textarea {
  width: 100%;
  height: 200px;
  border: 2px dashed #ddd;
  border-radius: 8px;
  padding: 10px;
  font-size: 18px;

.import-info { color: white; font-size: 13px; margin-top: 10px; opacity: 0.8; text-align: center; }

  border-radius: 12px;

  margin-top: 15px;

    </div>

  </div>

    <div class="word-list" id="wrong-list"></div>
  </div>

  <!-- Stats View -->
  <div id="view-stats" class="view">
    <div id="stats-area"></div>
  </div>
</div>

function getDefaultCards() {
  return JSON.parse(JSON.stringify(DEFAULT_CARDS));
}

function loadCards() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      return JSON.parse(data);
    }
  } catch(e) {
    console.warn('localStorage not available:', e);
  }
  // First time or storage unavailable: seed with default cards
  const defaults = getDefaultCards();
  saveCards(defaults);
  return defaults;
}

function saveCards(cards) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  } catch(e) {
    console.warn('Could not save to localStorage:', e);
    alert('⚠️ 无法保存数据。请检查 Safari 设置：设置 → Safari → 高级 → 网站数据，确保未禁用 localStorage。');
  }
}

// ============ Core Logic ============
function getTodayCards() {
  const cards = loadCards();
  const today = getToday();
  return cards.filter(c => {
    if (c.status === 'new') return true;
    if (c.status === 'mastered') return false;
    return c.nextReview <= today;
  });
}

function markKnown(char) {
  const cards = loadCards();
  const card = cards.find(c => c.char === char);
  if (!card) return;
  
  const today = getToday();
  card.correctCount = (card.correctCount || 0) + 1;
  card.lastSeen = today;
  
  if (card.status === 'new') {
    card.status = 'reviewing';
    card.level = 0;
    card.nextReview = addDays(today, INTERVALS[0]);
  } else {
    card.level = Math.min((card.level || 0) + 1, INTERVALS.length);
    if (card.level >= INTERVALS.length) {
      card.status = 'mastered';
      card.nextReview = null;
    } else {
      card.status = 'reviewing';
      card.nextReview = addDays(today, INTERVALS[card.level]);
    }
  }
  
  saveCards(cards);
}

function markUnknown(char) {
  const cards = loadCards();
  const card = cards.find(c => c.char === char);
  if (!card) return;
  
  const today = getToday();
  card.incorrectCount = (card.incorrectCount || 0) + 1;
  card.lastSeen = today;
  card.status = 'learning';
  card.level = 0;
  card.nextReview = today; // 当天再复习
  
  saveCards(cards);
}

// ============ UI ============
let currentQueue = [];
let currentIndex = 0;
let todayDone = [];

function updateStats() {
  const cards = loadCards();
  const today = getToday();
  const todayCards = getTodayCards();
  
  document.getElementById('stat-today').textContent = todayCards.length;
  document.getElementById('stat-known').textContent = cards.filter(c => c.status === 'reviewing' || c.status === 'mastered').length;
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-mastered').textContent = cards.filter(c => c.status === 'mastered').length;
}

function startStudy() {
  currentQueue = getTodayCards();
  // Shuffle
  for (let i = currentQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentQueue[i], currentQueue[j]] = [currentQueue[j], currentQueue[i]];
  }
  currentIndex = 0;
  todayDone = [];
  showCurrentCard();
}

function showCurrentCard() {
  const area = document.getElementById('study-area');
  
  if (currentQueue.length === 0) {
    area.innerHTML = `
      <div class="empty">
        <div class="emoji">📭</div>
        <p>还没有字卡<br>点击「➕ 添加」导入字卡开始学习</p>
      </div>`;
    return;
  }
  
  if (currentIndex >= currentQueue.length) {
    // Check if there are retry cards (marked unknown today)
    const retryCards = getTodayCards();
    if (retryCards.length > 0) {
      currentQueue = retryCards;
      currentIndex = 0;
      showCurrentCard();
      return;
    }
    
    area.innerHTML = `
      <div class="card">
        <div class="done">
          <div class="emoji">🎉</div>
          <h2>今天复习完成！</h2>
          <p>完成了 ${todayDone.length} 个字卡</p>
          <p style="margin-top:10px;font-size:14px;">明天再来复习吧！</p>
        </div>
      </div>`;
    updateStats();
    return;
  }
  
  const card = currentQueue[currentIndex];
  const progress = ((currentIndex) / currentQueue.length * 100).toFixed(0);
  const levelText = card.status === 'new' ? '新字' : 
                    card.status === 'learning' ? '复习中' :
                    `第${(card.level||0)+1}次复习`;
  
  area.innerHTML = `
    <div class="progress-bar">
      <div class="progress-fill" style="width:${progress}%"></div>
    </div>
    <div style="text-align:center;color:white;font-size:13px;margin-bottom:10px;">
      ${currentIndex + 1} / ${currentQueue.length} · ${levelText}
    </div>
    <div class="card" id="current-card">
      <div class="hanzi">${card.char}</div>
      <div class="pinyin">${card.pinyin || ''}</div>
      <div class="word">${card.word || ''}</div>
      <div class="sentence">${card.sentence || ''}</div>
      <button class="hint-btn" onclick="document.getElementById('current-card').classList.add('show-hint');this.style.display='none';">
        💡 显示提示
      </button>
    </div>
    <div class="buttons">
      <button class="btn btn-dont-know" onclick="handleUnknown('${card.char}')">
        ❌ 不认识
      </button>
      <button class="btn btn-know" onclick="handleKnown('${card.char}')">
        ✅ 认识
      </button>
    </div>`;
}

function handleKnown(char) {
  markKnown(char);
  todayDone.push(char);
  currentIndex++;
  showCurrentCard();
  updateStats();
}

function handleUnknown(char) {
  markUnknown(char);
  todayDone.push(char);
  currentIndex++;
  showCurrentCard();
  updateStats();
}

// ============ Word List ============
function showWordList() {
  const cards = loadCards();
  const list = document.getElementById('word-list');
  
  if (cards.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">还没有字卡</div>';
    return;
  }
  
  // Sort: learning first, then reviewing, then mastered
  const order = { learning: 0, new: 1, reviewing: 2, mastered: 3 };
  cards.sort((a, b) => (order[a.status] || 0) - (order[b.status] || 0));
  
  list.innerHTML = cards.map(c => {
    const badgeClass = `badge-${c.status || 'new'}`;
    const statusText = c.status === 'new' ? '新' : 
                       c.status === 'learning' ? '学习中' :
                       c.status === 'reviewing' ? `复习L${(c.level||0)+1}` :
                       '已掌握 ✨';
    const nextText = c.nextReview ? `下次: ${c.nextReview}` : '';
    return `
      <div class="word-item">
        <span class="char">${c.char}</span>
        <span style="flex:1;margin-left:15px;">
          <span style="font-size:14px;">${c.pinyin || ''}</span>
          <span style="font-size:13px;color:#aaa;margin-left:5px;">${c.word || ''}</span>
        </span>
        <span>
          <span class="badge ${badgeClass}">${statusText}</span>
          <div class="info">${nextText}</div>
        </span>
      </div>`;
  }).join('');
}

// ============ Import/Export ============
function importCards() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) return alert('请输入字卡内容');
  
  const lines = text.split('\n').filter(l => l.trim());
  const existing = loadCards();
  const existingChars = new Set(existing.map(c => c.char));
  let added = 0;
  
  lines.forEach(line => {
    const parts = line.trim().split(/\s+/);
    const char = parts[0];
    if (!char || existingChars.has(char)) return;
    
    existing.push({
      char: char,
      pinyin: parts[1] || '',
      word: parts[2] || '',
      status: 'new',
      level: 0,
      nextReview: null,
      lastSeen: null,
      correctCount: 0,
      incorrectCount: 0,
      addedDate: getToday()
    });
    existingChars.add(char);
    added++;
  });
  
  saveCards(existing);
  document.getElementById('import-text').value = '';
  alert(`成功导入 ${added} 个新字卡！（跳过 ${lines.length - added} 个重复）`);
  updateStats();
  startStudy();
}

function exportCards() {
  const cards = loadCards();
  const json = JSON.stringify(cards, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wenhao_flashcards_${getToday()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (confirm('确定要重置所有数据吗？进度将恢复到初始状态！')) {
    const defaults = getDefaultCards();
    saveCards(defaults);
    updateStats();
    startStudy();
    alert('所有数据已重置为初始状态');
  }
}

// ============ Navigation ============
function switchView(view, btnEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  if (btnEl) btnEl.classList.add('active');
  
  if (view === 'study') startStudy();
  if (view === 'list') showWordList();
  if (view === 'wrong') showWrongList();
  if (view === 'stats') showStats();
}

// ============ Wrong List ============
function showWrongList() {
  const cards = loadCards().filter(c => c.status === 'learning');
  const list = document.getElementById('wrong-list');
  
  if (cards.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">🎉 没有不认识的字！</div>';
    return;
  }
  
  list.innerHTML = '<div style="padding:10px;font-size:14px;color:#e17055;font-weight:bold;">共 ' + cards.length + ' 个不认识的字</div>' +
    cards.map(c => `
      <div class="word-item">
        <span class="char">${c.char}</span>
        <span style="flex:1;margin-left:15px;">
          <span style="font-size:14px;">${c.pinyin || ''}</span>
          <span style="font-size:13px;color:#aaa;margin-left:5px;">${c.word || ''}</span>
        </span>
        <span>
          <span style="font-size:12px;color:#e17055;">错 ${c.incorrectCount || 0} 次</span>
        </span>
      </div>`).join('');
}

// ============ Stats ============
function showStats() {
  const cards = loadCards();
  const area = document.getElementById('stats-area');
  const today = getToday();
  
  const total = cards.length;
  const newCount = cards.filter(c => c.status === 'new').length;
  const learningCount = cards.filter(c => c.status === 'learning').length;
  const reviewingCount = cards.filter(c => c.status === 'reviewing').length;
  const masteredCount = cards.filter(c => c.status === 'mastered').length;
  const seenToday = cards.filter(c => c.lastSeen === today).length;
  const correctToday = cards.filter(c => c.lastSeen === today && c.status !== 'learning').length;
  const wrongToday = cards.filter(c => c.lastSeen === today && c.status === 'learning').length;
  
  // Accuracy
  const totalCorrect = cards.reduce((s, c) => s + (c.correctCount || 0), 0);
  const totalWrong = cards.reduce((s, c) => s + (c.incorrectCount || 0), 0);
  const totalAttempts = totalCorrect + totalWrong;
  const accuracy = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;
  
  // Progress percentages
  const masteredPct = total > 0 ? Math.round(masteredCount / total * 100) : 0;
  const reviewingPct = total > 0 ? Math.round(reviewingCount / total * 100) : 0;
  const learningPct = total > 0 ? Math.round(learningCount / total * 100) : 0;
  const newPct = total > 0 ? Math.round(newCount / total * 100) : 0;
  
  // Get daily history from cards (last 7 days)
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    const studied = cards.filter(c => c.lastSeen === d).length;
    days.push({ date: d, studied: studied });
  }
  
  area.innerHTML = `
    <div class="stats-card">
      <h3>📅 今日学习</h3>
      <div class="stats-row"><span class="label">已学习</span><span class="value">${seenToday} 字</span></div>
      <div class="stats-row"><span class="label">认识</span><span class="value" style="color:#00b894;">${correctToday} 字</span></div>
      <div class="stats-row"><span class="label">不认识</span><span class="value" style="color:#e17055;">${wrongToday} 字</span></div>
    </div>
    
    <div class="stats-card">
      <h3>📈 总体进度</h3>
      <div class="stats-row"><span class="label">总字数</span><span class="value">${total}</span></div>
      <div class="stats-bar">
        <div class="stats-bar-fill" style="width:${masteredPct + reviewingPct}%;background:linear-gradient(90deg, #00b894 ${total > 0 ? masteredPct/(masteredPct+reviewingPct)*100 : 0}%, #a29bfe ${total > 0 ? masteredPct/(masteredPct+reviewingPct)*100 : 0}%);"></div>
      </div>
      <div class="stats-row"><span class="label">🟢 已掌握</span><span class="value">${masteredCount} (${masteredPct}%)</span></div>
      <div class="stats-row"><span class="label">🟣 复习中</span><span class="value">${reviewingCount} (${reviewingPct}%)</span></div>
      <div class="stats-row"><span class="label">🟡 学习中(不认识)</span><span class="value" style="color:#e17055;">${learningCount} (${learningPct}%)</span></div>
      <div class="stats-row"><span class="label">🔵 未学习</span><span class="value">${newCount} (${newPct}%)</span></div>
      <div class="stats-row"><span class="label">📊 总正确率</span><span class="value">${accuracy}%</span></div>
    </div>
    
    <div class="stats-card">
      <h3>📆 最近7天</h3>
      ${days.map(d => `
        <div class="history-item">
          <span>${d.date}</span>
          <span style="font-weight:bold;">${d.studied > 0 ? d.studied + ' 字' : '—'}</span>
        </div>
      `).join('')}
    </div>
    
    <div class="data-section">
      <h3>💾 数据管理</h3>
      <p style="font-size:12px;color:#999;margin-bottom:10px;">导出进度可以备份学习记录，换浏览器时导入恢复。</p>
      <button class="import-btn" onclick="exportCards()">📤 导出学习进度</button>
      <button class="import-btn" style="background:#00b894;margin-top:5px;" onclick="importProgress()">📥 导入学习进度</button>
      <input type="file" id="import-file" accept=".json" style="display:none;" onchange="handleImportFile(event)">
    </div>
  `;
}

// ============ Import Progress ============
function importProgress() {
  document.getElementById('import-file').click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      saveCards(imported);
      alert('成功导入 ' + imported.length + ' 个字卡的学习进度！');
      updateStats();
      startStudy();
    } catch(err) {
      alert('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ Init ============
// Check localStorage availability
function checkStorage() {
  try {
    localStorage.setItem('_test', '1');
    localStorage.removeItem('_test');
  } catch(e) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#e17055;color:white;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;text-align:center;';
    banner.textContent = '⚠️ 存储不可用！数据无法保存。请在普通模式（非无痕）下打开，或检查 Safari 隐私设置。';
    document.querySelector('.container').insertBefore(banner, document.querySelector('.stats'));
  }
}
