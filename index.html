function logAction(correct){
  const log=loadLog(),t=getToday();

  if(correct)log[t].correct++;else log[t].incorrect++;

}

function makeCard(a){
  return {char:a[0],pinyin:a[1],word:a[2],sentence:a[3],status:"new",level:0,nextReview:null,lastSeen:null,correctCount:0,incorrectCount:0,hintUsed:false,consecutiveNoHint:0,addedDate:getToday()};
}
function getDefaultCards(){return R.map(makeCard)}

function loadCards(){
  let c=null;
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){c=JSON.parse(r);if(Array.isArray(c)&&c.length>0){c.forEach(x=>{if(x.hintUsed===undefined)x.hintUsed=false;if(x.consecutiveNoHint===undefined)x.consecutiveNoHint=0});
  // Auto-add new default chars not yet in storage
  const ex=new Set(c.map(x=>x.char));let added=0;
  R.forEach(a=>{if(!ex.has(a[0])){c.push(makeCard(a));ex.add(a[0]);added++}});
  if(added>0){saveCards(c);console.log('Auto-added',added,'new cards')}
  return c}}}catch(e){console.warn(e)}
  try{const r=localStorage.getItem(OLD_KEY);if(r){c=JSON.parse(r);if(Array.isArray(c)&&c.length>0){c=migrateOld(c);saveCards(c);return c}}}catch(e){console.warn(e)}
  c=getDefaultCards();saveCards(c);return c;
}
function migrateOld(old){
  const m=[],s=new Set();
  old.forEach(c=>{if(c.char==='绍'&&c.pinyin==='sào')c.pinyin='shào';if(['世纪','幽默','严肃'].includes(c.char))return;c.hintUsed=c.hintUsed||false;c.consecutiveNoHint=c.consecutiveNoHint||0;if(!s.has(c.char)){s.add(c.char);m.push(c)}});
  R.forEach(a=>{if(!s.has(a[0])){s.add(a[0]);m.push(makeCard(a))}});return m;
}
function saveCards(c){try{const j=JSON.stringify(c);localStorage.setItem(STORAGE_KEY,j);if(!localStorage.getItem(STORAGE_KEY))throw new Error('Write fail')}catch(e){console.error(e);alert('⚠️ 保存失败: '+e.message)}}

function getTodayCards(){
  const c=loadCards(),t=getToday(),q=[];
  const learning=c.filter(x=>x.status==='learning');
  const reviewing=c.filter(x=>x.status==='reviewing'&&x.nextReview&&x.nextReview<=t);
  const hint=c.filter(x=>x.status==='reviewing'&&x.hintUsed&&(!x.nextReview||x.nextReview>t));
  const fresh=c.filter(x=>x.status==='new');
  q.push(...learning,...reviewing,...hint);
  const rem=DAILY_LIMIT-q.length;if(rem>0)q.push(...fresh.slice(0,rem));
  return q;
}
function getUnknownCards(){return loadCards().filter(c=>c.status==='learning')}

function markKnown(ch,usedHint){
  const c=loadCards(),card=c.find(x=>x.char===ch);if(!card)return;
  const t=getToday();card.correctCount=(card.correctCount||0)+1;card.lastSeen=t;card.hintUsed=usedHint;
  // Per-card history
  if(!card.history)card.history=[];
  card.history.push({date:t,result:'correct',hint:usedHint});
  if(!usedHint)card.consecutiveNoHint=(card.consecutiveNoHint||0)+1;else card.consecutiveNoHint=0;
  if(card.consecutiveNoHint>=2&&card.status!=='new'){card.status='mastered';card.nextReview=null;saveCards(c);logAction(true);return}
  if(card.status==='new'){card.status='reviewing';card.level=0;card.nextReview=addDays(t,INTERVALS[0])}
  else if(card.status==='learning'){card.status='reviewing';card.level=0;card.consecutiveNoHint=0;card.nextReview=addDays(t,INTERVALS[0])}
  else{card.level=Math.min((card.level||0)+1,INTERVALS.length);if(card.level>=INTERVALS.length){card.status='mastered';card.nextReview=null}else card.nextReview=addDays(t,INTERVALS[card.level])}
  saveCards(c);logAction(true);
}
function markUnknown(ch){
  const c=loadCards(),card=c.find(x=>x.char===ch);if(!card)return;
  const t=getToday();card.incorrectCount=(card.incorrectCount||0)+1;card.lastSeen=t;card.status='learning';card.level=0;card.nextReview=t;card.hintUsed=false;card.consecutiveNoHint=0;
  if(!card.history)card.history=[];
  card.history.push({date:t,result:'incorrect'});
  saveCards(c);logAction(false);
}

let currentQueue=[],currentIndex=0,todayDone=[],currentHintUsed=false,reviewMode='normal';

function updateStats(){
  const c=loadCards();
  document.getElementById('stat-today').textContent=getTodayCards().length;
  document.getElementById('stat-known').textContent=c.filter(x=>x.status==='reviewing'||x.status==='mastered').length;
  document.getElementById('stat-total').textContent=c.length;
  document.getElementById('stat-mastered').textContent=c.filter(x=>x.status==='mastered').length;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startStudy(){
  reviewMode='normal';currentQueue=getTodayCards();
  const l=currentQueue.filter(c=>c.status==='learning'),r=currentQueue.filter(c=>c.status!=='learning');
  currentQueue=[...shuffle(l),...shuffle(r)];currentIndex=0;todayDone=[];showCurrentCard();
}
function startWrongReview(){reviewMode='wrong';currentQueue=shuffle(getUnknownCards().slice());currentIndex=0;todayDone=[];showCurrentCard()}

function showCurrentCard(){
  const area=document.getElementById(reviewMode==='wrong'?'wrong-area':'study-area');currentHintUsed=false;
  if(!currentQueue.length){area.innerHTML=reviewMode==='wrong'?'<div class="empty"><div class="emoji">🎉</div><p>没有不认识的字！</p></div>':'<div class="empty"><div class="emoji">📭</div><p>还没有字卡<br>点击「➕ 添加」开始</p></div>';return}
  if(currentIndex>=currentQueue.length){
    if(reviewMode==='wrong'){const rt=getUnknownCards();if(rt.length>0){currentQueue=shuffle(rt);currentIndex=0;showCurrentCard();return}area.innerHTML='<div class="card"><div class="done"><div class="emoji">🎉</div><h2>不认识的字全部复习完成！</h2></div></div>'}
    else{const rt=getTodayCards().filter(c=>c.status==='learning');if(rt.length>0){currentQueue=shuffle(rt);currentIndex=0;showCurrentCard();return}area.innerHTML='<div class="card"><div class="done"><div class="emoji">🎉</div><h2>今天学习完成！</h2><p>完成了 '+todayDone.length+' 个字卡</p></div></div>'}
    updateStats();return;
  }
  const card=currentQueue[currentIndex],prog=(currentIndex/currentQueue.length*100).toFixed(0);
  const ml=reviewMode==='wrong'?'🔴 专项复习 ':'';
  const lt=card.status==='new'?'新字':card.status==='learning'?'❌ 不认识':card.hintUsed?'💡 需巩固':'第'+(card.level||0)+1+'次复习';
  const nh=card.consecutiveNoHint>0?' · 连续'+card.consecutiveNoHint+'次无提示':'';
  // Escape char for onclick
  const esc=card.char.replace(/'/g,"\\'");
  area.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
<div style="text-align:center;color:#fff;font-size:13px;margin-bottom:10px">${ml}${currentIndex+1} / ${currentQueue.length} · ${lt}${nh}</div>
<div class="card" id="current-card"><div class="hanzi">${card.char}</div><div class="pinyin">${card.pinyin||''}</div><div class="word">${card.word||''}</div><div class="sentence">${card.sentence||''}</div><button class="hint-btn" onclick="useHint()">💡 显示提示</button></div>
<div class="buttons"><button class="btn btn-dont-know" onclick="handleUnknown('${esc}')">❌ 不认识</button><button class="btn btn-know" onclick="handleKnown('${esc}')">✅ 认识</button></div>`;
}
function useHint(){currentHintUsed=true;const el=document.getElementById('current-card');if(el){el.classList.add('show-hint');el.querySelector('.hint-btn').style.display='none'}}
function handleKnown(ch){markKnown(ch,currentHintUsed);todayDone.push(ch);currentIndex++;showCurrentCard();updateStats()}
function handleUnknown(ch){markUnknown(ch);todayDone.push(ch);currentIndex++;showCurrentCard();updateStats()}

let listFilter='all';
function showWordList(){
  const c=loadCards(),list=document.getElementById('word-list'),fb=document.getElementById('list-filter');
  const counts={all:c.length,new:c.filter(x=>x.status==='new').length,learning:c.filter(x=>x.status==='learning').length,reviewing:c.filter(x=>x.status==='reviewing').length,mastered:c.filter(x=>x.status==='mastered').length};
  fb.innerHTML=['all','new','learning','reviewing','mastered'].map(k=>{
    const labels={all:'全部'+counts.all,new:'🔵新字'+counts.new,learning:'🔴不认识'+counts.learning,reviewing:'🟣复习中'+counts.reviewing,mastered:'🟢已掌握'+counts.mastered};
    return `<button class="filter-btn ${listFilter===k?'active':''}" onclick="listFilter='${k}';showWordList()">${labels[k]}</button>`;
  }).join('');
  let filtered=listFilter==='all'?c:c.filter(x=>x.status===listFilter);
  const order={learning:0,new:1,reviewing:2,mastered:3};filtered.sort((a,b)=>(order[a.status]||0)-(order[b.status]||0));
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:40px;color:#999">暂无字卡</div>';return}
  list.innerHTML=filtered.map(c=>{
    const bc='badge-'+(c.status||'new'),st=c.status==='new'?'新':c.status==='learning'?'不认识':c.status==='reviewing'?'复习L'+((c.level||0)+1):'已掌握✨';
    return `<div class="word-item"><span class="char">${c.char}</span><span style="flex:1;margin-left:15px"><span style="font-size:14px">${c.pinyin||''}</span> <span style="font-size:13px;color:#aaa">${c.word||''}</span></span><span><span class="badge ${bc}">${st}</span><div style="font-size:11px;color:#999">${c.nextReview?'下次:'+c.nextReview:''}</div></span></div>`;
  }).join('');
}

function showWrongList(){
  const cards=loadCards().filter(c=>c.status==='learning'),area=document.getElementById('wrong-area');
  if(!cards.length){area.innerHTML='<div style="text-align:center;padding:40px;color:#fff">🎉 没有不认识的字！</div>';return}
  let h=`<button class="review-btn" onclick="startWrongReview()">🔴 专项复习这 ${cards.length} 个不认识的字</button><div class="word-list">`;
  h+='<div style="padding:10px;font-size:14px;color:#e17055;font-weight:700">共 '+cards.length+' 个不认识的字</div>';
  cards.forEach(c=>{h+=`<div class="word-item"><span class="char">${c.char}</span><span style="flex:1;margin-left:15px"><span style="font-size:14px">${c.pinyin||''}</span> <span style="font-size:13px;color:#aaa">${c.word||''}</span></span><span style="font-size:12px;color:#e17055">错${c.incorrectCount||0}次</span></div>`});
  area.innerHTML=h+'</div>';
}

function importCards(){
  const text=document.getElementById('import-text').value.trim();if(!text)return alert('请输入字卡内容');
  const lines=text.split('\n').filter(l=>l.trim()),existing=loadCards(),ex=new Set(existing.map(c=>c.char));let added=0;
  lines.forEach(line=>{const p=line.trim().split(/\s+/),ch=p[0];if(!ch||ex.has(ch))return;
  existing.push({char:ch,pinyin:p[1]||'',word:p[2]||'',sentence:p.slice(3).join('')||'',status:'new',level:0,nextReview:null,lastSeen:null,correctCount:0,incorrectCount:0,hintUsed:false,consecutiveNoHint:0,addedDate:getToday()});ex.add(ch);added++});
  saveCards(existing);document.getElementById('import-text').value='';alert('导入 '+added+' 个新字卡！（跳过 '+(lines.length-added)+' 个重复）');updateStats();
}
function exportCards(){
  const raw=localStorage.getItem(STORAGE_KEY);if(!raw){alert('⚠️ 没有数据！');return}
  const cards=JSON.parse(raw),log=loadLog(),total=cards.length,learned=cards.filter(c=>c.status!=='new').length,mast=cards.filter(c=>c.status==='mastered').length,unk=cards.filter(c=>c.status==='learning').length;
  if(!confirm(`导出 ${total} 个字卡\n✅已学:${learned} ⭐已掌握:${mast} ❌不认识:${unk} 🆕未学:${total-learned}\n📆每日记录:${Object.keys(log).length}天\n确认？`))return;
  const d={version:'v4',exportDate:new Date().toISOString(),totalCards:total,stats:{learned,mastered:mast,unknown:unk},dailyLog:log,cards};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='wenhao_flashcards_'+getToday()+'.json';a.click();URL.revokeObjectURL(url);
}
function resetAll(){if(!confirm('确定重置？所有进度将丢失！'))return;if(!confirm('再次确认？'))return;saveCards(getDefaultCards());saveLog({});updateStats();startStudy();alert('已重置')}

function showStats(){
  const c=loadCards(),area=document.getElementById('stats-area'),t=getToday(),total=c.length;
  const nc=c.filter(x=>x.status==='new').length,lc=c.filter(x=>x.status==='learning').length,rc=c.filter(x=>x.status==='reviewing').length,mc=c.filter(x=>x.status==='mastered').length;
  const st=c.filter(x=>x.lastSeen===t).length,ct=c.filter(x=>x.lastSeen===t&&x.status!=='learning').length,wt=c.filter(x=>x.lastSeen===t&&x.status==='learning').length;
  const tc=c.reduce((s,x)=>s+(x.correctCount||0),0),tw=c.reduce((s,x)=>s+(x.incorrectCount||0),0),ta=tc+tw,acc=ta>0?Math.round(tc/ta*100):0;
  const mp=total>0?Math.round(mc/total*100):0,rp=total>0?Math.round(rc/total*100):0;
  const days=[];for(let i=0;i<7;i++){const d=addDays(t,-i);days.push({date:d,n:c.filter(x=>x.lastSeen===d).length})}
  area.innerHTML=`<div class="stats-card"><h3>📅 今日学习</h3><div class="stats-row"><span class="label">已学习</span><span class="value">${st} 字</span></div><div class="stats-row"><span class="label">认识</span><span class="value" style="color:#00b894">${ct}</span></div><div class="stats-row"><span class="label">不认识</span><span class="value" style="color:#e17055">${wt}</span></div></div>
<div class="stats-card"><h3>📈 总体进度 (${total}字)</h3><div class="stats-bar"><div class="stats-bar-fill" style="width:${mp+rp}%;background:linear-gradient(90deg,#00b894 ${mp}%,#a29bfe ${mp}%)"></div></div>
<div class="stats-row"><span class="label">🟢 已掌握</span><span class="value">${mc} (${mp}%)</span></div>
<div class="stats-row"><span class="label">🟣 复习中</span><span class="value">${rc} (${rp}%)</span></div>
<div class="stats-row"><span class="label">🔴 不认识</span><span class="value" style="color:#e17055">${lc}</span></div>
<div class="stats-row"><span class="label">🔵 未学习</span><span class="value">${nc}</span></div>
<div class="stats-row"><span class="label">📊 正确率</span><span class="value">${acc}%</span></div></div>
<div class="stats-card"><h3>📆 最近7天</h3>${days.map(d=>'<div class="history-item"><span>'+d.date+'</span><span style="font-weight:700">'+(d.n>0?d.n+' 字':'—')+'</span></div>').join('')}</div>
<div class="data-section"><h3>💾 数据管理</h3><button class="import-btn" onclick="exportCards()">📤 导出学习进度</button><button class="import-btn" style="background:#00b894;margin-top:5px" onclick="document.getElementById('imp-f').click()">📥 导入学习进度</button><input type="file" id="imp-f" accept=".json" style="display:none" onchange="handleImpF(event)"></div>`;
}
function handleImpF(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{let d=JSON.parse(ev.target.result);
  // Restore daily log if present
  if(d.dailyLog){saveLog(d.dailyLog);console.log('Restored daily log:',Object.keys(d.dailyLog).length,'days')}
  if(d.version==='v4'&&d.cards)d=d.cards;
  if(!Array.isArray(d))throw new Error('格式错误');d.forEach(c=>{if(c.hintUsed===undefined)c.hintUsed=false;if(c.consecutiveNoHint===undefined)c.consecutiveNoHint=0;if(!c.history)c.history=[]});saveCards(d);alert('导入 '+d.length+' 个字卡！');updateStats();startStudy()}catch(err){alert('导入失败: '+err.message)}};r.readAsText(f);e.target.value=''}

function switchView(v,btn){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');if(btn)btn.classList.add('active');if(v==='study')startStudy();if(v==='list')showWordList();if(v==='wrong')showWrongList();if(v==='stats')showStats()}

(function init(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t')}catch(e){const b=document.createElement('div');b.style.cssText='background:#e17055;color:#fff;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;text-align:center';b.textContent='⚠️ 存储不可用！请在普通模式下打开。';document.querySelector('.container').insertBefore(b,document.querySelector('.stats'))}
updateStats();startStudy()})();
</script>
</body>
</html>
