function makeCard(arr) {
  return {
    char:arr[0], pinyin:arr[1], word:arr[2], sentence:arr[3],
    status:"new", level:0, nextReview:null, lastSeen:null,
    correctCount:0, incorrectCount:0, hintUsed:false,
    consecutiveNoHint:0, addedDate:getToday()
  };
}
function getDefaultCards(){ return CARD_RAW.map(makeCard); }

// ===== STORAGE =====
function loadCards() {
  let cards = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      cards = JSON.parse(raw);
      if (Array.isArray(cards) && cards.length > 0) {
        // Migrate: add new fields if missing
        cards.forEach(c => {
          if (c.hintUsed === undefined) c.hintUsed = false;
          if (c.consecutiveNoHint === undefined) c.consecutiveNoHint = 0;
        });
        return cards;
      }
    }
  } catch(e) { console.warn('v4 storage read error:', e); }

  // Try migrating from old version
  try {
    const oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
    if (oldRaw) {
      cards = JSON.parse(oldRaw);
      if (Array.isArray(cards) && cards.length > 0) {
        console.log('Migrating from old storage, found', cards.length, 'cards');
        // Fix known issues: split combined chars, fix pinyin
        cards = migrateOldCards(cards);
        saveCards(cards);
        return cards;
      }
    }
  } catch(e) { console.warn('Old storage migration error:', e); }

  // Fresh start
  cards = getDefaultCards();
  saveCards(cards);
  return cards;
}

function migrateOldCards(old) {
  const migrated = [];
  const seen = new Set();
  old.forEach(c => {
    // Fix: 绍 pinyin
    if (c.char === '绍' && c.pinyin === 'sào') c.pinyin = 'shào';
    // Skip combined entries (世纪, 幽默, 严肃) - we have individual chars now
    if (['世纪','幽默','严肃'].includes(c.char)) return;
    // Add migration fields
    c.hintUsed = c.hintUsed || false;
    c.consecutiveNoHint = c.consecutiveNoHint || 0;
    if (!seen.has(c.char)) {
      seen.add(c.char);
      migrated.push(c);
    }
  });
  // Add any default chars that don't exist in old data
  CARD_RAW.forEach(arr => {
    if (!seen.has(arr[0])) {
      seen.add(arr[0]);
      migrated.push(makeCard(arr));
    }
  });
  return migrated;
}

function saveCards(cards) {
  try {
    const json = JSON.stringify(cards);
    localStorage.setItem(STORAGE_KEY, json);
    // Verify write
    const check = localStorage.getItem(STORAGE_KEY);
    if (!check || check.length < 10) {
      throw new Error('Write verification failed');
    }
  } catch(e) {
    console.error('Save failed:', e);
    alert('⚠️ 保存失败！请检查浏览器存储设置。\n错误: ' + e.message);
  }
}

// ===== CORE LOGIC =====
function getTodayCards() {
  const cards = loadCards();
  const today = getToday();
  const queue = [];

  // Priority 1: learning (不认识的字) - highest priority
  const learning = cards.filter(c => c.status === 'learning');
  // Priority 2: reviewing cards due today (包括点了提示的)
  const reviewing = cards.filter(c => c.status === 'reviewing' && c.nextReview && c.nextReview <= today);
  // Priority 3: hint-used cards that are reviewing but not yet due (提前复习)
  const hintCards = cards.filter(c => c.status === 'reviewing' && c.hintUsed && (!c.nextReview || c.nextReview > today));
  // Priority 4: new cards
  const newCards = cards.filter(c => c.status === 'new');

  // Combine with priority order, respect daily limit
  queue.push(...learning, ...reviewing, ...hintCards);
  // Fill remaining with new cards
  const remaining = DAILY_LIMIT - queue.length;
  if (remaining > 0) queue.push(...newCards.slice(0, remaining));

  return queue;
}

function getUnknownCards() {
  return loadCards().filter(c => c.status === 'learning');
}

function markKnown(char, usedHint) {
  const cards = loadCards();
  const card = cards.find(c => c.char === char);
  if (!card) return;
  const today = getToday();
  card.correctCount = (card.correctCount || 0) + 1;
  card.lastSeen = today;
  card.hintUsed = usedHint;

  if (!usedHint) {
    card.consecutiveNoHint = (card.consecutiveNoHint || 0) + 1;
  } else {
    card.consecutiveNoHint = 0;
  }

  // 连续两次没点提示就认识 → 直接掌握
  if (card.consecutiveNoHint >= 2 && card.status !== 'new') {
    card.status = 'mastered';
    card.nextReview = null;
    saveCards(cards);
    return;
  }

  if (card.status === 'new') {
    card.status = 'reviewing';
    card.level = 0;
    card.nextReview = addDays(today, INTERVALS[0]);
  } else if (card.status === 'learning') {
    // 从不认识恢复，重新开始复习
    card.status = 'reviewing';
    card.level = 0;
    card.consecutiveNoHint = 0; // 重置连续计数
    card.nextReview = addDays(today, INTERVALS[0]);
  } else {
    card.level = Math.min((card.level || 0) + 1, INTERVALS.length);
    if (card.level >= INTERVALS.length) {
      card.status = 'mastered';
      card.nextReview = null;
    } else {
      card.nextReview = addDays(today, INTERVALS[card.level]);
    }
  }
  saveCards(cards);
}

function markUnknown(char) {
  const cards = loadCards();
  const card = cards.find(c => c.char === char);
  if (!card) return;
  const today = getToday();
  card.incorrectCount = (card.incorrectCount || 0) + 1;
  card.lastSeen = today;
  card.status = 'learning';
  card.level = 0;
  card.nextReview = today;
  card.hintUsed = false;
  card.consecutiveNoHint = 0;
  saveCards(cards);
}

function updateStats() {
  const cards = loadCards();
  const todayCards = getTodayCards();
  document.getElementById('stat-today').textContent = todayCards.length;
  document.getElementById('stat-known').textContent = cards.filter(c => c.status === 'reviewing' || c.status === 'mastered').length;
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-mastered').textContent = cards.filter(c => c.status === 'mastered').length;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startStudy() {
  reviewMode = 'normal';
  currentQueue = getTodayCards();
  // Shuffle within priority groups but keep learning cards first
  const learning = currentQueue.filter(c => c.status === 'learning');
  const rest = currentQueue.filter(c => c.status !== 'learning');
  currentQueue = [...shuffle(learning), ...shuffle(rest)];
  currentIndex = 0;
  todayDone = [];
  showCurrentCard();
}

function startWrongReview() {
  reviewMode = 'wrong';
  currentQueue = getUnknownCards();
  shuffle(currentQueue);
  currentIndex = 0;
  todayDone = [];
  showCurrentCard();
}

function showCurrentCard() {
  const area = document.getElementById(reviewMode === 'wrong' ? 'wrong-area' : 'study-area');
  currentHintUsed = false;

  if (currentQueue.length === 0) {
    if (reviewMode === 'wrong') {
      area.innerHTML = '<div class="empty"><div class="emoji">🎉</div><p>没有不认识的字！太棒了！</p></div>';
    } else {
      area.innerHTML = '<div class="empty"><div class="emoji">📭</div><p>还没有字卡<br>点击「➕ 添加」导入字卡开始学习</p></div>';
    }
    return;
  }

  if (currentIndex >= currentQueue.length) {
    // Check for retry
    if (reviewMode === 'wrong') {
      const retry = getUnknownCards();
      if (retry.length > 0) {
        currentQueue = shuffle(retry);
        currentIndex = 0;
        showCurrentCard();
        return;
      }
      area.innerHTML = '<div class="card"><div class="done"><div class="emoji">🎉</div><h2>不认识的字全部复习完成！</h2><p>继续加油！</p></div></div>';
    } else {
      const retry = getTodayCards().filter(c => c.status === 'learning');
      if (retry.length > 0) {
        currentQueue = shuffle(retry);
        currentIndex = 0;
        showCurrentCard();
        return;
      }
      area.innerHTML = '<div class="card"><div class="done"><div class="emoji">🎉</div><h2>今天学习完成！</h2><p>完成了 '+todayDone.length+' 个字卡</p><p style="margin-top:10px;font-size:14px">明天再来复习吧！</p></div></div>';
    }
    updateStats();
    return;
  }

  const card = currentQueue[currentIndex];
  const progress = (currentIndex / currentQueue.length * 100).toFixed(0);
  const modeLabel = reviewMode === 'wrong' ? '🔴 专项复习' : '';
  const levelText = card.status === 'new' ? '新字' :
                    card.status === 'learning' ? '❌ 不认识' :
                    card.status === 'mastered' ? '✅ 已掌握' :
                    card.hintUsed ? '💡 需巩固' : '第'+(card.level||0)+1+'次复习';
  const noHintInfo = card.consecutiveNoHint > 0 ? ' · 连续'+card.consecutiveNoHint+'次无提示' : '';

  area.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div style="text-align:center;color:#fff;font-size:13px;margin-bottom:10px">
      ${modeLabel} ${currentIndex+1} / ${currentQueue.length} · ${levelText}${noHintInfo}
    </div>
    <div class="card" id="current-card">
      <div class="hanzi">${card.char}</div>
      <div class="pinyin">${card.pinyin||''}</div>
      <div class="word">${card.word||''}</div>
      <div class="sentence">${card.sentence||''}</div>
      <button class="hint-btn" onclick="useHint()">💡 显示提示</button>
    </div>
    <div class="buttons">
      <button class="btn btn-dont-know" onclick="handleUnknown('${card.char}')">❌ 不认识</button>
      <button class="btn btn-know" onclick="handleKnown('${card.char}')">✅ 认识</button>
    </div>`;
}

function useHint() {
  currentHintUsed = true;
  const el = document.getElementById('current-card');
  if (el) {
    el.classList.add('show-hint');
    el.querySelector('.hint-btn').style.display = 'none';
  }
}

function handleKnown(char) {
  markKnown(char, currentHintUsed);
  todayDone.push(char);
  currentIndex++;
  showCurrentCard();
  updateStats();
}

function handleUnknown(char) {
  markUnknown(char);
  todayDone.push(char);
  currentIndex++;
  showCurrentCard();
  updateStats();
}

// ===== WORD LIST =====
function showWordList() {
  const cards = loadCards();
  const list = document.getElementById('word-list');
  if (!cards.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999">还没有字卡</div>'; return; }
  const order = {learning:0, new:1, reviewing:2, mastered:3};
  cards.sort((a,b) => (order[a.status]||0) - (order[b.status]||0));
  list.innerHTML = cards.map(c => {
    const bc = 'badge-'+(c.status||'new');
    const st = c.status==='new'?'新': c.status==='learning'?'不认识': c.status==='reviewing'?'复习L'+(c.level||0)+1: '已掌握✨';
    const nh = c.consecutiveNoHint > 0 ? ' 🔥'+c.consecutiveNoHint : '';
    return `<div class="word-item"><span class="char">${c.char}</span><span style="flex:1;margin-left:15px"><span style="font-size:14px">${c.pinyin||''}</span> <span style="font-size:13px;color:#aaa">${c.word||''}</span></span><span><span class="badge ${bc}">${st}${nh}</span><div class="info">${c.nextReview?'下次:'+c.nextReview:''}</div></span></div>`;
  }).join('');
}

// ===== WRONG LIST WITH REVIEW BUTTON =====
function showWrongList() {
  const cards = loadCards().filter(c => c.status === 'learning');
  const area = document.getElementById('wrong-area');
  if (!cards.length) {
    area.innerHTML = '<div style="text-align:center;padding:40px;color:#fff">🎉 没有不认识的字！</div>';
    return;
  }
  let html = `<button class="review-btn" onclick="startWrongReview()">🔴 专项复习这 ${cards.length} 个不认识的字</button>`;
  html += '<div class="word-list">';
  html += '<div style="padding:10px;font-size:14px;color:#e17055;font-weight:700">共 '+cards.length+' 个不认识的字</div>';
  cards.forEach(c => {
    html += `<div class="word-item"><span class="char">${c.char}</span><span style="flex:1;margin-left:15px"><span style="font-size:14px">${c.pinyin||''}</span> <span style="font-size:13px;color:#aaa">${c.word||''}</span></span><span style="font-size:12px;color:#e17055">错${c.incorrectCount||0}次</span></div>`;
  });
  html += '</div>';
  area.innerHTML = html;
}

// ===== IMPORT / EXPORT =====
function importCards() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) return alert('请输入字卡内容');
  const lines = text.split('\n').filter(l => l.trim());
  const existing = loadCards();
  const existingChars = new Set(existing.map(c => c.char));
  let added = 0;
  lines.forEach(line => {
    const parts = line.trim().split(/\s+/);
    const ch = parts[0];
    if (!ch || existingChars.has(ch)) return;
    existing.push({
      char:ch, pinyin:parts[1]||'', word:parts[2]||'', sentence:parts.slice(3).join('')||'',
      status:'new', level:0, nextReview:null, lastSeen:null,
      correctCount:0, incorrectCount:0, hintUsed:false,
      consecutiveNoHint:0, addedDate:getToday()
    });
    existingChars.add(ch);
    added++;
  });
  saveCards(existing);
  document.getElementById('import-text').value = '';
  alert('成功导入 '+added+' 个新字卡！（跳过 '+(lines.length-added)+' 个重复）');
  updateStats();
}

function exportCards() {
  // Read directly from storage and verify
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    alert('⚠️ 没有找到存储数据！');
    return;
  }
  const cards = JSON.parse(raw);
  // Show verification info
  const total = cards.length;
  const learned = cards.filter(c => c.status !== 'new').length;
  const mastered = cards.filter(c => c.status === 'mastered').length;
  const unknown = cards.filter(c => c.status === 'learning').length;
  const msg = `即将导出 ${total} 个字卡\n✅ 已学习: ${learned} 个\n⭐ 已掌握: ${mastered} 个\n❌ 不认识: ${unknown} 个\n🆕 未学习: ${total-learned} 个\n\n确认导出？`;
  if (!confirm(msg)) return;

  // Export with metadata
  const exportData = {
    version: 'v4',
    exportDate: new Date().toISOString(),
    totalCards: total,
    stats: { learned, mastered, unknown, newCount: total-learned },
    cards: cards
  };
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wenhao_flashcards_'+getToday()+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm('确定要重置所有数据吗？\n⚠️ 所有学习进度将丢失！')) return;
  if (!confirm('再次确认：真的要重置吗？')) return;
  const defaults = getDefaultCards();
  saveCards(defaults);
  updateStats();
  startStudy();
  alert('所有数据已重置');
}

// ===== STATS =====
function showStats() {
  const cards = loadCards();
  const area = document.getElementById('stats-area');
  const today = getToday();
  const total = cards.length;
  const newC = cards.filter(c=>c.status==='new').length;
  const learnC = cards.filter(c=>c.status==='learning').length;
  const revC = cards.filter(c=>c.status==='reviewing').length;
  const mastC = cards.filter(c=>c.status==='mastered').length;
  const seenToday = cards.filter(c=>c.lastSeen===today).length;
  const correctToday = cards.filter(c=>c.lastSeen===today&&c.status!=='learning').length;
  const wrongToday = cards.filter(c=>c.lastSeen===today&&c.status==='learning').length;
  const totalCorr = cards.reduce((s,c)=>s+(c.correctCount||0),0);
  const totalWrong = cards.reduce((s,c)=>s+(c.incorrectCount||0),0);
  const totalAtt = totalCorr+totalWrong;
  const acc = totalAtt>0?Math.round(totalCorr/totalAtt*100):0;
  const mp = total>0?Math.round(mastC/total*100):0;
  const rp = total>0?Math.round(revC/total*100):0;
  const lp = total>0?Math.round(learnC/total*100):0;
  const np = total>0?Math.round(newC/total*100):0;
  const days=[];
  for(let i=0;i<7;i++){const d=addDays(today,-i);days.push({date:d,studied:cards.filter(c=>c.lastSeen===d).length});}

  area.innerHTML = `
  <div class="stats-card"><h3>📅 今日学习</h3>
  <div class="stats-row"><span class="label">已学习</span><span class="value">${seenToday} 字</span></div>
  <div class="stats-row"><span class="label">认识</span><span class="value" style="color:#00b894">${correctToday} 字</span></div>
  <div class="stats-row"><span class="label">不认识</span><span class="value" style="color:#e17055">${wrongToday} 字</span></div></div>
  <div class="stats-card"><h3>📈 总体进度</h3>
  <div class="stats-row"><span class="label">总字数</span><span class="value">${total}</span></div>
  <div class="stats-bar"><div class="stats-bar-fill" style="width:${mp+rp}%;background:linear-gradient(90deg,#00b894 ${total>0?mp/(mp+rp||1)*100:0}%,#a29bfe ${total>0?mp/(mp+rp||1)*100:0}%)"></div></div>
  <div class="stats-row"><span class="label">🟢 已掌握</span><span class="value">${mastC} (${mp}%)</span></div>
  <div class="stats-row"><span class="label">🟣 复习中</span><span class="value">${revC} (${rp}%)</span></div>
  <div class="stats-row"><span class="label">🔴 不认识</span><span class="value" style="color:#e17055">${learnC} (${lp}%)</span></div>
  <div class="stats-row"><span class="label">🔵 未学习</span><span class="value">${newC} (${np}%)</span></div>
  <div class="stats-row"><span class="label">📊 总正确率</span><span class="value">${acc}%</span></div></div>
  <div class="stats-card"><h3>📆 最近7天</h3>
  ${days.map(d=>'<div class="history-item"><span>'+d.date+'</span><span style="font-weight:700">'+(d.studied>0?d.studied+' 字':'—')+'</span></div>').join('')}</div>
  <div class="data-section"><h3>💾 数据管理</h3>
  <p style="font-size:12px;color:#999;margin-bottom:10px">导出可备份学习记录，导入可恢复进度。</p>
  <button class="import-btn" onclick="exportCards()">📤 导出学习进度</button>
  <button class="import-btn" style="background:#00b894;margin-top:5px" onclick="importProgress()">📥 导入学习进度</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)"></div>`;
}

function importProgress(){ document.getElementById('import-file').click(); }
function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      let data = JSON.parse(ev.target.result);
      // Support both v4 format (with metadata) and old flat array
      if (data.version === 'v4' && data.cards) {
        data = data.cards;
      }
      if (!Array.isArray(data)) throw new Error('格式不正确');
      // Migrate fields
      data.forEach(c => {
        if (c.hintUsed === undefined) c.hintUsed = false;
        if (c.consecutiveNoHint === undefined) c.consecutiveNoHint = 0;
      });
      saveCards(data);
      alert('成功导入 '+data.length+' 个字卡的学习进度！');
      updateStats();
      startStudy();
    } catch(err) { alert('导入失败：'+err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== NAV =====
function switchView(view, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  if(btn) btn.classList.add('active');
  if(view==='study') startStudy();
  if(view==='list') showWordList();
  if(view==='wrong') showWrongList();
  if(view==='stats') showStats();
}

// ===== INIT =====
function checkStorage() {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); }
  catch(e) {
    const b=document.createElement('div');
    b.style.cssText='background:#e17055;color:#fff;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;text-align:center';
    b.textContent='⚠️ 存储不可用！请在普通模式下打开。';
    document.querySelector('.container').insertBefore(b,document.querySelector('.stats'));
  }
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
checkStorage();
updateStats();
startStudy();
</script>
